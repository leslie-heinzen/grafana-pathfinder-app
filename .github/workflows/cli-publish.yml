# Pathfinder CLI / MCP build and publish.
#
# Triggers:
#   - push to main / pull_request: build, pack, image-build, local smoke test.
#     No publish.
#   - push of a `cli-v*` tag (e.g., cli-v1.1.0): same, plus npm publish and
#     Docker push. Publish steps gracefully skip if secrets are absent so
#     the workflow is fully wired and validated end-to-end before tokens
#     exist.
#
# See docs/design/phases/ai-authoring-2-distribution.md (decision log
# entries "Tag scheme: cli-v*" and "Secret-gated publish") for rationale.

name: CLI publish

on:
  push:
    branches:
      - main
    tags:
      - 'cli-v*'
  pull_request:
    branches:
      - main
    paths:
      - 'src/cli/**'
      - 'src/types/**'
      - 'src/validation/**'
      - 'scripts/prepublish-cli.js'
      - 'scripts/pack-cli.js'
      - 'scripts/docker-entrypoint.sh'
      - 'scripts/__tests__/**'
      - 'tsconfig.cli.json'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.cli'
      - '.dockerignore'
      - 'README-cli.md'
      - '.github/workflows/cli-publish.yml'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  IMAGE_NAME_DOCKERHUB: grafana/pathfinder-cli
  IMAGE_NAME_GHCR: ghcr.io/grafana/pathfinder-cli

jobs:
  build:
    name: Build, pack, image, local smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      schema-version: ${{ steps.version.outputs.schema-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Read CURRENT_SCHEMA_VERSION
        id: version
        run: |
          version="$(node -e "console.log(require('./scripts/prepublish-cli').readSchemaVersion())")"
          echo "schema-version=${version}" >> "$GITHUB_OUTPUT"
          echo "Schema version: ${version}"

      - name: Validate cli-v* tag matches CURRENT_SCHEMA_VERSION
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          tag_version="${GITHUB_REF_NAME#cli-v}"
          schema_version="${{ steps.version.outputs.schema-version }}"
          if [ "$tag_version" != "$schema_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match CURRENT_SCHEMA_VERSION ($schema_version)."
            echo "Either retag with cli-v${schema_version} or bump CURRENT_SCHEMA_VERSION." >&2
            exit 1
          fi

      - name: Unit tests (prepublish + CLI)
        run: npx jest --no-coverage scripts/__tests__ src/cli

      - name: Build CLI
        run: npm run build:cli

      - name: Pack
        run: npm run pack:cli

      - name: Smoke test the local pack
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.schema-version }}"
          tarball="pathfinder-cli-${version}.tgz"
          test -f "$tarball" || { echo "Expected $tarball"; ls -la *.tgz; exit 1; }
          installdir="$(mktemp -d)"
          (cd "$installdir" && npm init -y >/dev/null && npm install "$GITHUB_WORKSPACE/$tarball" >/dev/null)
          observed="$("$installdir/node_modules/.bin/pathfinder-cli" --version)"
          [ "$observed" = "$version" ] || { echo "CLI version mismatch: observed=$observed expected=$version"; exit 1; }
          set +e
          "$installdir/node_modules/.bin/pathfinder-mcp"
          mcp_exit=$?
          set -e
          [ "$mcp_exit" -ne 0 ] || { echo "pathfinder-mcp placeholder should exit non-zero"; exit 1; }

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        with:
          context: .
          file: Dockerfile.cli
          load: true
          push: false
          tags: pathfinder-cli:smoke

      - name: Smoke test the Docker image
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.schema-version }}"
          observed="$(docker run --rm pathfinder-cli:smoke --version)"
          [ "$observed" = "$version" ] || { echo "Docker CLI version mismatch: observed=$observed expected=$version"; exit 1; }
          if docker run --rm pathfinder-cli:smoke mcp; then
            echo "MCP placeholder should exit non-zero"
            exit 1
          fi

      - name: Upload tarball (release runs only)
        if: startsWith(github.ref, 'refs/tags/cli-v')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pathfinder-cli-tarball
          path: pathfinder-cli-*.tgz
          retention-days: 7

  publish-npm:
    name: Publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build CLI
        run: npm run build:cli

      - name: Rewrite manifest for publish
        run: node scripts/prepublish-cli.js --write

      - name: npm publish (skipped if NPM_TOKEN absent)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN not configured; skipping npm publish."
            echo "Add NPM_TOKEN to repository secrets to enable real publishes."
            exit 0
          fi
          npm publish --access public

  publish-docker:
    name: Publish Docker image
    needs: build
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Check Docker secrets
        id: docker-secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "::warning::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not configured; skipping Docker publish."
            echo "Add both to repository secrets to enable real publishes."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3
        if: steps.docker-secrets.outputs.skip == 'false'

      - name: Login to Docker Hub
        if: steps.docker-secrets.outputs.skip == 'false'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: steps.docker-secrets.outputs.skip == 'false'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.docker-secrets.outputs.skip == 'false'
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: |
            ${{ env.IMAGE_NAME_DOCKERHUB }}:${{ needs.build.outputs.schema-version }}
            ${{ env.IMAGE_NAME_DOCKERHUB }}:latest
            ${{ env.IMAGE_NAME_GHCR }}:${{ needs.build.outputs.schema-version }}
            ${{ env.IMAGE_NAME_GHCR }}:latest

  smoke-registry:
    name: Smoke-test the registry copy
    needs: [build, publish-npm, publish-docker]
    if: |
      startsWith(github.ref, 'refs/tags/cli-v') &&
      needs.publish-npm.result == 'success' &&
      needs.publish-docker.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npx pathfinder-cli@<version> --version
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN absent — publish was skipped, nothing to smoke."
            exit 0
          fi
          version="${{ needs.build.outputs.schema-version }}"
          observed="$(npx --yes pathfinder-cli@${version} --version)"
          [ "$observed" = "$version" ] || { echo "npm registry smoke failed: observed=$observed expected=$version"; exit 1; }

      - name: docker run grafana/pathfinder-cli:<version> --version
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "DOCKERHUB_TOKEN absent — Docker publish was skipped, nothing to smoke."
            exit 0
          fi
          version="${{ needs.build.outputs.schema-version }}"
          observed="$(docker run --rm ${{ env.IMAGE_NAME_DOCKERHUB }}:${version} --version)"
          [ "$observed" = "$version" ] || { echo "Docker registry smoke failed: observed=$observed expected=$version"; exit 1; }
