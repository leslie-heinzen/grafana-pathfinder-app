# Pathfinder CLI / MCP build and publish.
#
# Triggers:
#   - pull_request to main: build, pack, image-build, local smoke. No push.
#   - push to main: same, plus push the resulting Docker image to GHCR as
#     `:latest` and `:main-<short-sha>`. The image is the canonical
#     consumable artifact: it can be pulled by Cloud Run (via an Artifact
#     Registry remote repository), used in other repos' GitHub Actions to
#     validate Pathfinder packages, or run locally with `docker run`.
#
# No npm publish, no Docker Hub push, no tag-driven release flow. The
# only registry is GHCR, authenticated by the always-present GITHUB_TOKEN —
# no repo secrets are needed to operate this workflow.
#
# See docs/design/phases/ai-authoring-2-distribution.md for the rationale.

name: CLI publish

on:
  push:
    branches:
      - main
    paths:
      - 'src/cli/**'
      - 'src/types/**'
      - 'src/validation/**'
      - 'scripts/cli-build-utils.js'
      - 'scripts/docker-entrypoint.sh'
      - 'tsconfig.cli.json'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.cli'
      - '.dockerignore'
      - '.github/workflows/cli-publish.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/cli/**'
      - 'src/types/**'
      - 'src/validation/**'
      - 'scripts/cli-build-utils.js'
      - 'scripts/docker-entrypoint.sh'
      - 'tsconfig.cli.json'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.cli'
      - '.dockerignore'
      - '.github/workflows/cli-publish.yml'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  IMAGE_NAME_GHCR: ghcr.io/grafana/pathfinder-cli

jobs:
  build:
    name: Build CLI, build image, smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      schema-version: ${{ steps.version.outputs.schema-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # SECURITY: Explicit cache disable. The repo's package.json has a
      # `packageManager` field which triggers automatic caching in setup-node v6.
      # Caching in workflows that publish artifacts is a supply chain attack
      # vector (cache poisoning). The CLI build is fast enough that the
      # tradeoff favors integrity.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Read CURRENT_SCHEMA_VERSION
        id: version
        run: |
          version="$(node scripts/cli-build-utils.js schema-version)"
          echo "schema-version=${version}" >> "$GITHUB_OUTPUT"
          echo "Schema version: ${version}"

      - name: Unit tests (CLI)
        run: npx jest --no-coverage src/cli

      - name: Build CLI
        run: npm run build:cli

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.cli
          load: true
          push: false
          tags: pathfinder-cli:smoke

      - name: Smoke test the Docker image
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.schema-version }}"
          observed_cli="$(docker run --rm pathfinder-cli:smoke --version)"
          [ "$observed_cli" = "$version" ] || { echo "Docker CLI version mismatch: observed=$observed_cli expected=$version"; exit 1; }
          observed_mcp="$(docker run --rm pathfinder-cli:smoke mcp --version)"
          [ "$observed_mcp" = "$version" ] || { echo "Docker MCP version mismatch: observed=$observed_mcp expected=$version"; exit 1; }

  publish-ghcr-main:
    name: Push :latest and :main-<sha> to GHCR
    needs: build
    # Only on push events to main — never on PRs (PRs may originate from
    # forks or untrusted contributors and must not push images).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for keyless cosign signing (sigstore OIDC).
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          echo "short-sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "main-tag=main-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build and push to GHCR
        id: ghcr-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile.cli
          push: true
          tags: |
            ${{ env.IMAGE_NAME_GHCR }}:latest
            ${{ env.IMAGE_NAME_GHCR }}:${{ steps.tags.outputs.main-tag }}

      - name: Sign GHCR image with cosign (keyless)
        env:
          DIGEST: ${{ steps.ghcr-push.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign the digest so both `:latest` and `:main-<sha>` are
          # covered (tags are mutable; digest is canonical).
          cosign sign --yes "${{ env.IMAGE_NAME_GHCR }}@${DIGEST}"

      - name: Smoke-test the pushed image
        env:
          MAIN_TAG: ${{ steps.tags.outputs.main-tag }}
        run: |
          set -euo pipefail
          observed_latest="$(docker run --rm ${{ env.IMAGE_NAME_GHCR }}:latest --version)"
          observed_sha="$(docker run --rm ${{ env.IMAGE_NAME_GHCR }}:${MAIN_TAG} --version)"
          expected="${{ needs.build.outputs.schema-version }}"
          [ "$observed_latest" = "$expected" ] || { echo "GHCR :latest smoke failed: observed=$observed_latest expected=$expected"; exit 1; }
          [ "$observed_sha" = "$expected" ] || { echo "GHCR :${MAIN_TAG} smoke failed: observed=$observed_sha expected=$expected"; exit 1; }
